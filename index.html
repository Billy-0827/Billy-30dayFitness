<!DOCTYPE html>

<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>30 Day Fitness Coach</title>

<link rel="apple-touch-icon" href="icon.png">

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:15px;
text-align:center;
}

h1{color:#00e676}

.card{
background:#1e1e1e;
padding:18px;
border-radius:12px;
margin:15px 0;
}

.exercise{
padding:10px;
border-bottom:1px solid #333;
}

.timer{
font-size:42px;
margin:15px;
}

button{
padding:14px;
margin:6px;
font-size:16px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
}

input{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<h1>30 Day Fitness Coach</h1>

<div class="card">

<h2 id="dayTitle"></h2>

<div id="workout"></div>

</div>

<div class="card">

<h2>Guided Workout</h2>

<div id="currentExercise">Press Start</div>

<div class="timer" id="timer">0:30</div>

<button onclick="startWorkout()">Start Workout</button>

</div>

<div class="card">

<h2>Treadmill</h2>

<div id="treadmill"></div>

</div>

<div class="card">

<h2>Progress Tracker</h2>

Weight (kg)<br> <input id="weight">

<br>

Waist (inches)<br> <input id="waist">

<br>

<button onclick="saveProgress()">Save Progress</button>

<canvas id="chart" width="300" height="200"></canvas>

</div>

<script>

let workouts=[

{
title:"Day 1",
exercises:["Dumbbell Squats","Pushups","Dumbbell Rows","Mountain Climbers"],
reps:["10","10","10","20"],
treadmill:"5 minute fast walk"
},

{
title:"Day 2",
exercises:["Lunges","Shoulder Press","Crunches","High Knees"],
reps:["10 each leg","12","15","20"],
treadmill:"5 minute incline walk"
},

{
title:"Day 3",
exercises:["Jumping Jacks","Mountain Climbers","Squats"],
reps:["30 sec","30 sec","30 sec"],
treadmill:"5 minute brisk walk"
}

]

let day=localStorage.getItem("day") || 1
let index=(day-1)%workouts.length
let data=workouts[index]

document.getElementById("dayTitle").innerHTML="Day "+day

let html=""

data.exercises.forEach((ex,i)=>{

html+=`<div class="exercise">${data.reps[i]} ${ex}</div>`

})

document.getElementById("workout").innerHTML=html

document.getElementById("treadmill").innerHTML=data.treadmill

let exerciseIndex=0
let time=30
let timer

function speak(text){

let msg=new SpeechSynthesisUtterance(text)
speechSynthesis.speak(msg)

}

function startWorkout(){

exerciseIndex=0
nextExercise()

}

function nextExercise(){

if(exerciseIndex>=data.exercises.length){

document.getElementById("currentExercise").innerHTML="Workout complete!"
speak("Workout complete")
return

}

let name=data.exercises[exerciseIndex]

document.getElementById("currentExercise").innerHTML=name

speak("Next exercise "+name)

time=30

timer=setInterval(function(){

time--

document.getElementById("timer").innerHTML="0:"+time

if(time<=0){

clearInterval(timer)

exerciseIndex++

nextExercise()

}

},1000)

}

function saveProgress(){

let weight=document.getElementById("weight").value
let waist=document.getElementById("waist").value

let data=JSON.parse(localStorage.getItem("progress") || "[]")

data.push({weight,waist})

localStorage.setItem("progress",JSON.stringify(data))

drawChart()

}

function drawChart(){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

let data=JSON.parse(localStorage.getItem("progress") || "[]")

ctx.clearRect(0,0,300,200)

ctx.beginPath()

data.forEach((p,i)=>{

let x=i*40+20
let y=200-(p.weight*2)

if(i==0)ctx.moveTo(x,y)
else ctx.lineTo(x,y)

})

ctx.strokeStyle="#00e676"
ctx.stroke()

}

drawChart()

</script>

</body>

</html>
