<!DOCTYPE html>

<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>30 Day Fitness Coach</title>

<link rel="apple-touch-icon" href="icon.png">

<style>

body{
font-family:Arial;
background:#121212;
color:white;
padding:20px;
text-align:center;
}

h1{color:#00e676}

.card{
background:#1e1e1e;
padding:20px;
border-radius:12px;
margin:15px;
}

.exercise{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.exercise:hover{
color:#00e676;
}

.timer{
font-size:40px;
margin:20px;
}

button{
padding:12px;
margin:8px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
font-size:16px;
}

.complete{
color:#00e676;
font-weight:bold;
}

.progressBoard{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
margin-top:10px;
}

.dayBox{
padding:8px;
background:#2a2a2a;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.dayBox:hover{
background:#3a3a3a;
}

.dayComplete{
background:#00c853;
color:black;
font-weight:bold;
}

.dayCurrent{
border:2px solid #00e676;
}

</style>

</head>

<body>

<h1>30 Day Fitness Coach</h1>

<div class="card">

<h2>Progress</h2>

<div id="progressBoard" class="progressBoard"></div>

</div>

<div class="card">

<h2>3 Minute Warmup</h2>

<div class="exercise" onclick="demo('jumping_jacks')">30 sec Jumping Jacks</div>
<div class="exercise" onclick="demo('arm_circles')">30 sec Arm Circles</div>
<div class="exercise" onclick="demo('bodyweight_squat')">30 sec Bodyweight Squats</div>
<div class="exercise" onclick="demo('high_knees')">30 sec High Knees</div>
<div class="exercise" onclick="demo('torso_twist')">30 sec Torso Twists</div>
<div class="exercise">30 sec Light Stretch</div>

</div>

<div class="card">

<h2 id="dayTitle"></h2>

<div id="completionStatus"></div>

<div id="strength"></div>

<h3>Treadmill</h3>

<div id="treadmill"></div>

</div>

<div class="card">

<div class="timer" id="timer">20:00</div>

<button onclick="startTimer()">Start Workout</button> <button onclick="prevDay()">Previous Day</button> <button onclick="completeDay()">Mark Complete ✓</button> <button onclick="nextDay()">Next Day</button>

</div>

<script>

let videoLinks={

pushup:"https://www.youtube.com/watch?v=_l3ySVKYVJ8",
dumbbell_row:"https://www.youtube.com/watch?v=pYcpY20QaE8",
dumbbell_squat:"https://www.youtube.com/watch?v=MeIiIdhvXT4",
mountain_climber:"https://www.youtube.com/watch?v=nmwgirgXLYM",
lunge:"https://www.youtube.com/watch?v=QOVaHwm-Q6U",
shoulder_press:"https://www.youtube.com/watch?v=B-aVuyhvLHU",
crunch:"https://www.youtube.com/watch?v=Xyd_fa5zoEU",
high_knees:"https://www.youtube.com/watch?v=OAJ_J3EZkdY",
bicycle_crunch:"https://www.youtube.com/watch?v=9FGilxCbdz8",
goblet_squat:"https://www.youtube.com/watch?v=6xwGFn-J_Q0",
reverse_lunge:"https://www.youtube.com/watch?v=wrwwXE_x-pQ",
glute_bridge:"https://www.youtube.com/watch?v=wPM8icPu6H8",
thruster:"https://www.youtube.com/watch?v=E1GkJdK5kR8",
jumping_jacks:"https://www.youtube.com/watch?v=c4DAnQ6DtF8",
arm_circles:"https://www.youtube.com/watch?v=140RTNMciH8",
bodyweight_squat:"https://www.youtube.com/watch?v=aclHkVaku9U",
torso_twist:"https://www.youtube.com/watch?v=wkD8rjkodUI"

}

function demo(name){
window.open(videoLinks[name])
}

let workouts=[

{
title:"Day 1",
strength:[
["10 Dumbbell Squats","dumbbell_squat"],
["10 Pushups","pushup"],
["10 Dumbbell Rows","dumbbell_row"],
["20 Mountain Climbers","mountain_climber"]
],
rounds:"Repeat 3 rounds",
treadmill:"5 minutes fast walk"
},

{
title:"Day 2",
strength:[
["10 Lunges each leg","lunge"],
["12 Dumbbell Shoulder Press","shoulder_press"],
["15 Crunches","crunch"],
["20 High Knees","high_knees"]
],
rounds:"Repeat 3 rounds",
treadmill:"5 minutes incline walk"
},

{
title:"Day 3",
strength:[
["30 sec Jumping Jacks","jumping_jacks"],
["30 sec Mountain Climbers","mountain_climber"],
["30 sec Squats","bodyweight_squat"]
],
rounds:"Repeat 4 rounds",
treadmill:"5 minutes brisk walk"
},

{
title:"Day 4",
strength:[
["12 Dumbbell Rows","dumbbell_row"],
["10 Pushups","pushup"],
["12 Shoulder Press","shoulder_press"],
["20 Bicycle Crunches","bicycle_crunch"]
],
rounds:"Repeat 3 rounds",
treadmill:"Light jog or fast walk 5 minutes"
},

{
title:"Day 5",
strength:[
["12 Goblet Squats","goblet_squat"],
["10 Reverse Lunges","reverse_lunge"],
["15 Glute Bridges","glute_bridge"],
["30 High Knees","high_knees"]
],
rounds:"Repeat 3 rounds",
treadmill:"5 minute incline walk"
},

{
title:"Day 6",
strength:[
["10 Squat + Dumbbell Press","thruster"],
["10 Pushups","pushup"],
["12 Dumbbell Rows","dumbbell_row"],
["20 Mountain Climbers","mountain_climber"]
],
rounds:"Repeat 4 rounds",
treadmill:"Moderate walk 5 minutes"
},

{
title:"Day 7",
strength:[["Rest Day",""]],
rounds:"",
treadmill:"Optional 20–30 minute walk"
}

]

let day=parseInt(localStorage.getItem("day") || 1)
let time=1200
let timer

function drawProgressBoard(){

let completed=JSON.parse(localStorage.getItem("completedDays") || "[]")

let board=""

for(let i=1;i<=30;i++){

let cls="dayBox"

if(completed.includes(i)) cls+=" dayComplete"

if(i===day) cls+=" dayCurrent"

board+=`<div class="${cls}" onclick="jumpDay(${i})">Day ${i}</div>`

}

document.getElementById("progressBoard").innerHTML=board

}

function jumpDay(d){

day=d
localStorage.setItem("day",day)

loadDay()

}

function loadDay(){

drawProgressBoard()

let index=(day-1)%7
let data=workouts[index]

document.getElementById("dayTitle").innerHTML="Day "+day

let completed=JSON.parse(localStorage.getItem("completedDays") || "[]")

if(completed.includes(day)){

document.getElementById("completionStatus").innerHTML="<div class='complete'>✓ Completed</div>"

}else{

document.getElementById("completionStatus").innerHTML=""

}

let html=""

data.strength.forEach(ex=>{

if(ex[0]=="Rest Day"){
html+="Rest day"
}else{
html+=`<div class="exercise" onclick="demo('${ex[1]}')">${ex[0]}</div>`
}

})

html+=`<p>${data.rounds}</p>`

document.getElementById("strength").innerHTML=html
document.getElementById("treadmill").innerHTML=data.treadmill

}

function startTimer(){

clearInterval(timer)

timer=setInterval(function(){

time--

let m=Math.floor(time/60)
let s=time%60

if(s<10)s="0"+s

document.getElementById("timer").innerHTML=m+":"+s

if(time<=0){

clearInterval(timer)
alert("Workout complete!")

}

},1000)

}

function nextDay(){

day++

if(day>30) day=30

localStorage.setItem("day",day)

time=1200
document.getElementById("timer").innerHTML="20:00"

loadDay()

}

function prevDay(){

day--

if(day<1) day=1

localStorage.setItem("day",day)

loadDay()

}

function completeDay(){

let completed=JSON.parse(localStorage.getItem("completedDays") || "[]")

if(!completed.includes(day)){

completed.push(day)

localStorage.setItem("completedDays",JSON.stringify(completed))

}

loadDay()

}

loadDay()

</script>

</body>

</html>
