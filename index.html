<!DOCTYPE html>

<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>30 Day Fitness Coach</title>

<link rel="apple-touch-icon" href="icon.png">

<style>

body{
font-family:Arial;
background:#121212;
color:white;
text-align:center;
padding:20px;
}

h1{color:#00e676}

.card{
background:#1e1e1e;
padding:20px;
border-radius:12px;
margin:15px;
}

button{
padding:15px;
margin:10px;
font-size:16px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
}

.timer{
font-size:42px;
margin:20px;
}

.exercise{
padding:8px;
cursor:pointer;
border-bottom:1px solid #333;
}

.exercise:hover{
color:#00e676;
}

</style>

</head>

<body>

<h1>30 Day Fitness Coach</h1>

<div class="card">

<h2>Warm-Up (3 minutes)</h2>

<div class="exercise" onclick="showDemo('jumping jacks exercise')">Jumping Jacks</div>
<div class="exercise" onclick="showDemo('arm circles exercise')">Arm Circles</div>
<div class="exercise" onclick="showDemo('bodyweight squats exercise')">Bodyweight Squats</div>
<div class="exercise" onclick="showDemo('high knees exercise')">High Knees</div>
<div class="exercise" onclick="showDemo('torso twists exercise')">Torso Twists</div>

</div>

<div class="card">

<h2 id="dayTitle">Day 1 Workout</h2>

<div id="workout"></div>

</div>

<div class="card">

<div class="timer" id="timer">20:00</div>

<button onclick="startWorkout()">Start Workout</button> <button onclick="nextDay()">Next Day</button>

</div>

<div class="card">

<h3>Progress Tracker</h3>

Weight (kg)<br> <input id="weight">

<br><br>

Waist (inches)<br> <input id="waist">

<br><br>

<button onclick="saveProgress()">Save Progress</button>

<div id="progressDisplay"></div>

</div>

<script>

let workouts=[

[
["Dumbbell Squats","dumbbell squat exercise"],
["Pushups","push up exercise"],
["Dumbbell Rows","dumbbell row exercise"],
["Mountain Climbers","mountain climbers exercise"]
],

[
["Lunges","lunge exercise"],
["Shoulder Press","dumbbell shoulder press exercise"],
["Crunches","crunch exercise"],
["High Knees","high knees exercise"]
],

[
["Jumping Jacks","jumping jacks exercise"],
["Mountain Climbers","mountain climbers exercise"],
["Squats","bodyweight squat exercise"]
],

[
["Dumbbell Rows","dumbbell row exercise"],
["Pushups","push up exercise"],
["Shoulder Press","shoulder press exercise"],
["Bicycle Crunch","bicycle crunch exercise"]
],

[
["Goblet Squats","goblet squat exercise"],
["Reverse Lunges","reverse lunge exercise"],
["Glute Bridges","glute bridge exercise"],
["High Knees","high knees exercise"]
],

[
["Squat + Dumbbell Press","dumbbell thruster exercise"],
["Pushups","push up exercise"],
["Dumbbell Rows","dumbbell row exercise"],
["Mountain Climbers","mountain climbers exercise"]
],

[
["REST DAY",""]
]

]

let day=localStorage.getItem("day") || 1
let time=1200
let timer

function loadDay(){

let index=(day-1)%7

document.getElementById("dayTitle").innerHTML="Day "+day

let html=""

workouts[index].forEach(ex=>{

if(ex[0]=="REST DAY"){

html+="Rest Day – Optional 20-30 min walk"

}else{

html+=`<div class="exercise" onclick="showDemo('${ex[1]}')">${ex[0]}</div>`

}

})

document.getElementById("workout").innerHTML=html

}

function showDemo(name){

let url="https://www.youtube.com/results?search_query="+name

window.open(url)

}

loadDay()

function startWorkout(){

clearInterval(timer)

timer=setInterval(function(){

time--

let m=Math.floor(time/60)
let s=time%60

if(s<10)s="0"+s

document.getElementById("timer").innerHTML=m+":"+s

if(time<=0){

clearInterval(timer)
alert("Workout complete! Great job!")

}

},1000)

}

function nextDay(){

day++

if(day>30)day=1

localStorage.setItem("day",day)

time=1200
document.getElementById("timer").innerHTML="20:00"

loadDay()

}

function saveProgress(){

let weight=document.getElementById("weight").value
let waist=document.getElementById("waist").value

localStorage.setItem("weight",weight)
localStorage.setItem("waist",waist)

document.getElementById("progressDisplay").innerHTML=
"Weight: "+weight+" kg<br>Waist: "+waist+" inches"

}

</script>

</body>
</html>
