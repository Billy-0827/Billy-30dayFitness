<!DOCTYPE html>

<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>30 Day Fitness Coach</title>

<link rel="apple-touch-icon" href="icon.png">

<style>

body{
font-family:Arial;
background:#121212;
color:white;
padding:20px;
text-align:center;
}

h1{color:#00e676}

.card{
background:#1e1e1e;
padding:20px;
border-radius:12px;
margin:15px;
}

.exercise{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.exercise:hover{
color:#00e676;
}

.timer{
font-size:40px;
margin:20px;
}

button{
padding:12px;
margin:8px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
font-size:16px;
}

</style>

</head>

<body>

<h1>30 Day Fitness Coach</h1>

<div class="card">

<h2>3 Minute Warmup</h2>

<div class="exercise" onclick="demo('jumping jacks exercise')">30 sec Jumping Jacks</div>
<div class="exercise" onclick="demo('arm circles exercise')">30 sec Arm Circles</div>
<div class="exercise" onclick="demo('bodyweight squat exercise')">30 sec Bodyweight Squats</div>
<div class="exercise" onclick="demo('high knees exercise')">30 sec High Knees</div>
<div class="exercise" onclick="demo('torso twist exercise')">30 sec Torso Twists</div>
<div class="exercise">30 sec Light Stretch</div>

</div>

<div class="card">

<h2 id="dayTitle"></h2>

<div id="strength"></div>

<h3>Treadmill</h3>

<div id="treadmill"></div>

</div>

<div class="card">

<div class="timer" id="timer">20:00</div>

<button onclick="startTimer()">Start Workout</button> <button onclick="nextDay()">Next Day</button>

</div>

<script>

let workouts=[

{
title:"Day 1",
strength:[
["10 Dumbbell Squats","dumbbell squat exercise"],
["10 Pushups","push up exercise"],
["10 Dumbbell Rows","dumbbell row exercise"],
["20 Mountain Climbers","mountain climbers exercise"]
],
rounds:"Repeat 3 rounds",
treadmill:"5 minutes fast walk"
},

{
title:"Day 2",
strength:[
["10 Lunges each leg","lunge exercise"],
["12 Dumbbell Shoulder Press","shoulder press exercise"],
["15 Crunches","crunch exercise"],
["20 High Knees","high knees exercise"]
],
rounds:"Repeat 3 rounds",
treadmill:"5 minutes incline walk"
},

{
title:"Day 3",
strength:[
["30 sec Jumping Jacks","jumping jacks exercise"],
["30 sec Mountain Climbers","mountain climbers exercise"],
["30 sec Squats","bodyweight squat exercise"]
],
rounds:"Repeat 4 rounds",
treadmill:"5 minutes brisk walk"
},

{
title:"Day 4",
strength:[
["12 Dumbbell Rows","dumbbell row exercise"],
["10 Pushups","push up exercise"],
["12 Shoulder Press","shoulder press exercise"],
["20 Bicycle Crunches","bicycle crunch exercise"]
],
rounds:"Repeat 3 rounds",
treadmill:"Light jog or fast walk for 5 minutes"
},

{
title:"Day 5",
strength:[
["12 Goblet Squats","goblet squat exercise"],
["10 Reverse Lunges","reverse lunge exercise"],
["15 Glute Bridges","glute bridge exercise"],
["30 High Knees","high knees exercise"]
],
rounds:"Repeat 3 rounds",
treadmill:"5 minute incline walk"
},

{
title:"Day 6",
strength:[
["10 Squat + Dumbbell Press","dumbbell thruster exercise"],
["10 Pushups","push up exercise"],
["12 Dumbbell Rows","dumbbell row exercise"],
["20 Mountain Climbers","mountain climbers exercise"]
],
rounds:"Repeat 4 rounds",
treadmill:"Moderate walk 5 minutes"
},

{
title:"Day 7",
strength:[["Rest Day",""]],
rounds:"",
treadmill:"Optional 20-30 minute walk"
}

]

let day=localStorage.getItem("day") || 1
let time=1200
let timer

function loadDay(){

let index=(day-1)%7
let data=workouts[index]

document.getElementById("dayTitle").innerHTML=data.title

let html=""

data.strength.forEach(ex=>{

if(ex[0]=="Rest Day"){
html+="Rest day"
}else{
html+=`<div class="exercise" onclick="demo('${ex[1]}')">${ex[0]}</div>`
}

})

html+=`<p>${data.rounds}</p>`

document.getElementById("strength").innerHTML=html

document.getElementById("treadmill").innerHTML=data.treadmill

}

function demo(name){

let url="https://www.youtube.com/results?search_query="+name
window.open(url)

}

function startTimer(){

clearInterval(timer)

timer=setInterval(function(){

time--

let m=Math.floor(time/60)
let s=time%60

if(s<10)s="0"+s

document.getElementById("timer").innerHTML=m+":"+s

if(time<=0){

clearInterval(timer)
alert("Workout complete!")

}

},1000)

}

function nextDay(){

day++

if(day>30)day=1

localStorage.setItem("day",day)

time=1200
document.getElementById("timer").innerHTML="20:00"

loadDay()

}

loadDay()

</script>

</body>

</html>
